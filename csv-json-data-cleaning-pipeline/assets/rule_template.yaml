# CSV/JSON数据批量清洗产线规则模板
# 说明：本文件用于描述一次数据清洗任务的规则配置，不包含实现代码。

task:
  name: "sample_cleaning_task"
  description: "CSV/JSON数据批量清洗示例任务"
  owner: "data_developer"

input:
  file_path: "examples/sample_input.csv"
  file_type: "csv"
  encoding: "utf-8"
  delimiter: ","

output:
  output_dir: "outputs/cleaning_result"
  cleaned_data_name: "cleaned_data.csv"
  issue_rows_name: "issue_rows.csv"
  cleaning_summary_name: "cleaning_summary.json"
  cleaning_log_name: "cleaning_log.csv"
  output_format: "csv"
  keep_issue_rows: true

field_mapping:
  enabled: false
  mapping_file: "assets/field_mapping_template.csv"

dictionary:
  enabled: false
  dictionary_file: "assets/dictionary_template.csv"

required_fields:
  - field: "id"
    allow_blank: false
    action: "mark"
  - field: "title"
    allow_blank: false
    action: "mark"
  - field: "content"
    allow_blank: false
    action: "mark"
  - field: "source"
    allow_blank: true
    action: "ignore"

unique_keys:
  enabled: true
  keys:
    - ["id"]
    - ["title", "source"]
  keep: "first"
  issue_action: "export"

null_handling:
  null_values:
    - ""
    - "null"
    - "None"
    - "N/A"
    - "NA"
    - "未知"
    - "无"
  strategies:
    - field: "title"
      action: "mark"
    - field: "content"
      action: "drop"
    - field: "source"
      action: "fill"
      fill_value: "unknown"

date_rules:
  enabled: true
  date_format: "YYYY-MM-DD"
  fields:
    - field: "publish_date"
      input_formats:
        - "YYYY-MM-DD"
        - "YYYY/MM/DD"
        - "YYYY年MM月DD日"
      invalid_action: "mark"

phone_rules:
  enabled: false
  phone_pattern: "^1[3-9][0-9]{9}$"
  fields:
    - field: "phone"
      country_code: "CN"
      remove_separators: true
      invalid_action: "mark"

amount_rules:
  enabled: false
  amount_precision: 2
  fields:
    - field: "amount"
      decimal_places: 2
      remove_currency_symbol: true
      allow_negative: false
      invalid_action: "mark"

enum_rules:
  enabled: true
  fields:
    - field: "status"
      allowed_values:
        - "valid"
        - "invalid"
        - "pending"
      standard_mapping:
        "有效": "valid"
        "无效": "invalid"
        "待处理": "pending"
      invalid_action: "mark"
    - field: "category"
      allowed_values:
        - "news"
        - "finance"
        - "medical"
        - "law"
      invalid_action: "mark"

anomaly_rules:
  enabled: true
  rules:
    - field: "content"
      rule_type: "min_length"
      value: 10
      invalid_action: "mark"
    - field: "score"
      rule_type: "range"
      min: 0
      max: 100
      invalid_action: "mark"

standardization:
  trim_whitespace: true
  normalize_full_half_width: false
  remove_extra_line_breaks: true
  normalize_empty_strings: true

logging:
  enabled: true
  log_level: "info"
  record_row_level_issue: true
  record_rule_summary: true

summary:
  enabled: true
  include_issue_statistics: true
  include_before_after_count: true
  include_rule_result: true

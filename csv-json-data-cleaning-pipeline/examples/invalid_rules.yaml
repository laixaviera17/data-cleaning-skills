task:
  name: "sample_csv_cleaning"
  description: "覆盖重复、空值、日期、手机号、金额、枚举和异常值规则的示例配置"
  owner: "data_developer"

input:
  file_path: "examples/sample_input.csv"
  file_type: "csv"
  encoding: "utf-8"
  delimiter: ","

output:
  output_dir: "examples/expected_outputs"
  cleaned_data_name: "cleaned_data_20260616.csv"
  issue_rows_name: "issue_rows_20260616.csv"
  cleaning_summary_name: "cleaning_summary_20260616.json"
  cleaning_log_name: "cleaning_log_20260616.csv"
  output_format: "csv"
  keep_issue_rows: true

unique_keys: "id"

null_handling:
  null_values:
    - ""
    - "null"
    - "None"
    - "N/A"
    - "NA"
    - "未知"
    - "无"
  strategies:
    - field: "title"
      action: "mark"
    - field: "content"
      action: "drop"
    - field: "source"
      action: "fill"
      fill_value: "unknown"

enum_rules:
  enabled: true
  fields:
    - field: "status"
      allowed_values:
        - "valid"
        - "invalid"
        - "pending"
      standard_mapping:
        "有效": "valid"
        "无效": "invalid"
        "待处理": "pending"
      invalid_action: "mark"
    - field: "category"
      allowed_values:
        - "news"
        - "finance"
        - "medical"
        - "law"
      invalid_action: "mark"

phone_rules:
  enabled: true
  phone_pattern: "^1[3-9][0-9]{9}$"
  fields:
    - field: "phone"
      country_code: "CN"
      remove_separators: true
      invalid_action: "mark"

amount_rules:
  enabled: true
  amount_precision: "two"
  fields:
    - field: "amount"
      decimal_places: 2
      remove_currency_symbol: true
      allow_negative: false
      invalid_action: "mark"

custom_rules:
  enabled: true
  rules:
    - name: "content_min_length"
      field: "content"
      rule_type: "min_length"
      value: 10
      invalid_action: "mark"
    - name: "score_range"
      field: "score"
      rule_type: "range"
      min: 0
      max: 100
      invalid_action: "mark"

standardization:
  trim_whitespace: true
  normalize_full_half_width: false
  remove_extra_line_breaks: true
  normalize_empty_strings: true

logging:
  enabled: true
  log_level: "info"
  record_row_level_issue: true
  record_rule_summary: true

summary:
  enabled: true
  include_issue_statistics: true
  include_before_after_count: true
  include_rule_result: true
